<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차량 규제 확인 및 월간 달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .nav-btn:active { transform: scale(0.9); }
        .calendar-day { min-height: 60px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 pb-12">

    <div class="max-w-md mx-auto space-y-6">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <h1 class="text-2xl font-extrabold text-slate-800 mb-8 text-center">🚗 운행 제한 판별기</h1>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-2 ml-1">차량 번호 끝자리</label>
                    <input type="number" id="carDigit" placeholder="0 ~ 9 입력" min="0" max="9" oninput="updateAll()"
                        class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all text-xl font-bold text-center">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-2 ml-1">확인 기준일</label>
                    <div class="flex items-center gap-2">
                        <button onclick="changeDate(-1)" class="nav-btn p-3 bg-slate-100 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                        </button>
                        <input type="date" id="checkDate" onchange="updateAll()"
                            class="flex-1 px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none font-semibold text-center">
                        <button onclick="changeDate(1)" class="nav-btn p-3 bg-slate-100 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="resultArea" class="mt-8 space-y-3 hidden">
                <div id="holidayBanner" class="hidden p-3 rounded-xl bg-amber-50 border border-amber-200 text-amber-800 text-center text-xs font-bold">
                    🎉 공휴일/주말은 규제가 없습니다!
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div id="card2" class="p-4 rounded-2xl border-2 flex flex-col items-center justify-center">
                        <p class="text-[10px] font-bold opacity-60">2부제</p>
                        <p id="text2" class="text-sm font-black"></p>
                    </div>
                    <div id="card5" class="p-4 rounded-2xl border-2 flex flex-col items-center justify-center">
                        <p class="text-[10px] font-bold opacity-60">5부제</p>
                        <p id="text5" class="text-sm font-black"></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="calendarArea" class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100 hidden">
            <h2 id="calendarTitle" class="text-lg font-bold text-slate-800 mb-4 text-center">2026년 0월</h2>
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-400 mb-2">
                <div class="text-red-400">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1">
                </div>
            <div class="mt-4 flex justify-center gap-4 text-[10px] font-semibold text-slate-400">
                <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> 가능</div>
                <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-500"></span> 제한</div>
            </div>
        </div>
    </div>

    <script>
        const dateInput = document.getElementById('checkDate');
        
        // 1. 접속 시 항상 오늘 날짜로 초기화 (캐시 무시)
        window.onload = function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;
            updateAll();
        };

        const holidays2026 = [
            "2026-01-01", "2026-02-16", "2026-02-17", "2026-02-18", "2026-02-19",
            "2026-03-01", "2026-03-02", "2026-05-01", "2026-05-05", "2026-05-24", 
            "2026-05-25", "2026-06-06", "2026-08-15", "2026-08-17", "2026-09-24", 
            "2026-09-25", "2026-09-26", "2026-09-28", "2026-10-03", "2026-10-05", 
            "2026-10-09", "2026-12-25"
        ];

        function changeDate(offset) {
            const current = new Date(dateInput.value);
            current.setDate(current.getDate() + offset);
            dateInput.valueAsDate = current;
            updateAll();
        }

        function updateAll() {
            checkSelectedDate();
            renderCalendar();
        }

        function checkSelectedDate() {
            const digit = document.getElementById('carDigit').value;
            if (digit === "") {
                document.getElementById('resultArea').classList.add('hidden');
                document.getElementById('calendarArea').classList.add('hidden');
                return;
            }
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('calendarArea').classList.remove('hidden');

            const res = getStatus(new Date(dateInput.value), parseInt(digit));
            
            const banner = document.getElementById('holidayBanner');
            if (res.isFree) banner.classList.remove('hidden');
            else banner.classList.add('hidden');

            updateUI('card2', 'text2', res.res2, res.isFree);
            updateUI('card5', 'text5', res.res5, res.isFree);
        }

        function getStatus(targetDate, lastDigit) {
            const y = targetDate.getFullYear();
            const m = String(targetDate.getMonth() + 1).padStart(2, '0');
            const d = String(targetDate.getDate()).padStart(2, '0');
            const dateStr = `${y}-${m}-${d}`;
            
            const dayOfWeek = targetDate.getDay();
            const dateNum = targetDate.getDate();
            const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            const isHoliday = holidays2026.includes(dateStr);
            const isFree = isWeekend || isHoliday;

            let res5 = false;
            const map5 = [[], [1,6], [2,7], [3,8], [4,9], [5,0], []];
            if (map5[dayOfWeek] && map5[dayOfWeek].includes(lastDigit)) res5 = true;

            let res2 = (dateNum % 2) !== (lastDigit % 2);

            return { isFree, res2, res5 };
        }

        function updateUI(cardId, textId, isRestricted, isFree) {
            const card = document.getElementById(cardId);
            const text = document.getElementById(textId);
            if (isFree) {
                card.className = "p-4 rounded-2xl border-2 flex flex-col items-center bg-indigo-50 border-indigo-100 text-indigo-600";
                text.innerText = "규제 없음";
            } else if (isRestricted) {
                card.className = "p-4 rounded-2xl border-2 flex flex-col items-center bg-red-50 border-red-100 text-red-600";
                text.innerText = "운행 제한";
            } else {
                card.className = "p-4 rounded-2xl border-2 flex flex-col items-center bg-emerald-50 border-emerald-100 text-emerald-600";
                text.innerText = "운행 가능";
            }
        }

        function renderCalendar() {
            const digit = parseInt(document.getElementById('carDigit').value);
            const baseDate = new Date(dateInput.value);
            const year = baseDate.getFullYear();
            const month = baseDate.getMonth();
            
            document.getElementById('calendarTitle').innerText = `${year}년 ${month + 1}월`;
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 빈 칸
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="calendar-day"></div>`;
            }

            // 날짜 채우기
            for (let d = 1; d <= lastDate; d++) {
                const iterDate = new Date(year, month, d);
                const status = getStatus(iterDate, digit);
                
                const dot2 = status.isFree ? 'bg-indigo-400' : (status.res2 ? 'bg-red-500' : 'bg-emerald-500');
                const dot5 = status.isFree ? 'bg-indigo-400' : (status.res5 ? 'bg-red-500' : 'bg-emerald-500');
                
                const isSelected = d === baseDate.getDate() ? 'ring-2 ring-blue-500 bg-blue-50' : 'bg-white';

                grid.innerHTML += `
                    <div class="calendar-day ${isSelected} rounded-lg border border-slate-100 flex flex-col items-center justify-between py-1">
                        <span class="text-[10px] font-bold ${iterDate.getDay()===0?'text-red-400':''}">${d}</span>
                        <div class="flex flex-col gap-0.5 w-full px-1">
                            <div class="flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full ${dot2}"></span>
                                <span class="text-[7px] text-slate-400">2부</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full ${dot5}"></span>
                                <span class="text-[7px] text-slate-400">5부</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
