<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차량 운행 규제 확인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
        <h1 class="text-2xl font-extrabold text-slate-800 mb-8 text-center flex items-center justify-center gap-2">
            🚗 운행 제한 판별기
        </h1>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-500 mb-2 ml-1">차량 번호 끝자리</label>
                <input type="number" id="carDigit" placeholder="0 ~ 9 사이 숫자 입력" min="0" max="9"
                    class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all text-xl font-bold">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-500 mb-2 ml-1">확인 기준일</label>
                <input type="date" id="checkDate" 
                    class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all font-semibold">
            </div>

            <button onclick="check()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-blue-600 transform active:scale-[0.98] transition-all shadow-lg text-lg">
                제한 여부 분석하기
            </button>
        </div>

        <div id="resultArea" class="mt-8 space-y-4 hidden">
            <div id="card5" class="p-5 rounded-2xl border-2 flex justify-between items-center">
                <div>
                    <p class="text-sm font-bold opacity-70">5부제 (요일 기준)</p>
                    <p id="text5" class="text-lg font-black mt-1"></p>
                </div>
                <div id="icon5" class="text-2xl"></div>
            </div>

            <div id="card2" class="p-5 rounded-2xl border-2 flex justify-between items-center">
                <div>
                    <p class="text-sm font-bold opacity-70">2부제 (날짜 기준)</p>
                    <p id="text2" class="text-lg font-black mt-1"></p>
                </div>
                <div id="icon2" class="text-2xl"></div>
            </div>

            <p class="text-center text-[11px] text-slate-400 pt-2 font-medium">
                ※ 2026년 환경 지침에 따라 하이브리드·경차도 제한 대상에 포함될 수 있습니다.
            </p>
        </div>
    </div>

    <script>
        // 초기 날짜 세팅
        document.getElementById('checkDate').valueAsDate = new Date();

        function check() {
            const digitInput = document.getElementById('carDigit').value;
            const dateInput = document.getElementById('checkDate').value;
            
            if (digitInput === "" || !dateInput) {
                alert("번호와 날짜를 입력해주세요.");
                return;
            }

            const lastDigit = parseInt(digitInput);
            const targetDate = new Date(dateInput);
            const day = targetDate.getDay(); 
            const date = targetDate.getDate();

            document.getElementById('resultArea').classList.remove('hidden');

            // --- 5부제 판별 ---
            let isRestricted5 = false;
            const map = [[], [1,6], [2,7], [3,8], [4,9], [5,0], []];
            if (map[day] && map[day].includes(lastDigit)) isRestricted5 = true;
            
            updateCard('card5', 'text5', 'icon5', isRestricted5);

            // --- 2부제 판별 ---
            // 날짜와 번호의 홀짝이 다르면 제한 (예: 1일(홀)에 2번(짝) 차는 제한)
            const isRestricted2 = (date % 2) !== (lastDigit % 2);
            
            updateCard('card2', 'text2', 'icon2', isRestricted2);
        }

        function updateCard(cardId, textId, iconId, isRestricted) {
            const card = document.getElementById(cardId);
            const text = document.getElementById(textId);
            const icon = document.getElementById(iconId);

            if (isRestricted) {
                card.className = "p-5 rounded-2xl border-2 flex justify-between items-center bg-red-50 border-red-200 text-red-700";
                text.innerText = "운행 제한 대상";
                icon.innerText = "🚫";
            } else {
                card.className = "p-5 rounded-2xl border-2 flex justify-between items-center bg-emerald-50 border-emerald-200 text-emerald-700";
                text.innerText = "정상 운행 가능";
                icon.innerText = "✅";
            }
        }
    </script>
</body>
</html>
